<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGNIUS PRODUCT</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #050505;
  color: white;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  padding: 20px 60px;
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav h1 {
  font-family: 'Oswald';
  letter-spacing: 4px;
}

/* CONTENEDOR */
.container {
  display: flex;
  min-height: 100vh;
  padding: 120px 60px;
  gap: 80px;
}

/* IMAGEN */
.image-box {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 1000px;
}

.image-box img {
  width: 100%;
  max-width: 500px;
  border-radius: 20px;
  background: white;
  padding: 20px;
  transition: 0.4s;
}

/* INFO */
.info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  animation: fadeUp 1s ease;
}

.info h2 {
  font-size: 60px;
  font-family: 'Oswald';
}

.price {
  margin-top: 10px;
  font-size: 28px;
  color: #00ff88;
}

.desc {
  margin-top: 20px;
  opacity: 0.7;
  line-height: 1.6;
}

/* BOTÓN */
.buy {
  margin-top: 30px;
  padding: 16px;
  border-radius: 40px;
  border: none;
  background: linear-gradient(45deg, #00ff88, #00ccff);
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.buy:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(0,255,136,0.6);
}

/* ANIMACIÓN */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px);}
  to { opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<nav>
  <h1 onclick="goBack()" style="cursor:pointer;">MAGNIUS</h1>
</nav>

<div class="container">

  <div class="image-box">
    <img id="productImage" src="">
  </div>

  <div class="info">
    <h2 id="productName"></h2>
    <div class="price" id="productPrice"></div>
    <div class="desc">
      Premium streetwear. Diseño exclusivo de MAGNIUS.
    </div>
    <button class="buy">Comprar</button>
  </div>

</div>

<script>

/* 🔥 DATA DE PRODUCTOS */
const products = {
  "back-in-black.png": { name: "BACK IN BLACK", price: "30€" },
  "broken-black.png": { name: "BROKEN BLACK", price: "32€" },
  "dark-fade.png": { name: "DARK FADE", price: "28€" },
  "double-white-broken.png": { name: "DOUBLE WHITE", price: "35€" },
  "green-white.png": { name: "GREEN WHITE", price: "29€" },
  "o-green.png": { name: "O GREEN", price: "31€" },
  "simple-beige.png": { name: "SIMPLE BEIGE", price: "33€" },
  "simple-green.png": { name: "SIMPLE GREEN", price: "27€" },
  "simple-red.png": { name: "SIMPLE RED", price: "34€" },
  "soft-blue.png": { name: "SOFT BLUE", price: "36€" },
  "toro-beige.png": { name: "BEIGE BULL", price: "30€" },
  "toro-blue.png": { name: "BLUE BULL", price: "32€" },
  "triple-brown.png": { name: "TRIPLE BROWN", price: "29€" },
  "triple-white.png": { name: "TRIPLE WHITE", price: "35€" },
  "blanca.png": { name: "WHITE CORE", price: "29€" },
  "negra.png": { name: "BLACK PREMIUM", price: "35€" },
  "roja.png": { name: "RED STREET", price: "32€" }
};

/* 🔥 CARGAR PRODUCTO */
const params = new URLSearchParams(window.location.search);
const img = params.get("img");

if (products[img]) {
  document.getElementById("productImage").src = img;
  document.getElementById("productName").innerText = products[img].name;
  document.getElementById("productPrice").innerText = products[img].price;
}

/* 🌀 EFECTO 3D RATÓN */
const image = document.querySelector(".image-box");

image.addEventListener("mousemove", e => {
  const rect = image.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const rotateY = (x / rect.width - 0.5) * 20;
  const rotateX = -(y / rect.height - 0.5) * 20;

  image.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

image.addEventListener("mouseleave", () => {
  image.style.transform = `rotateX(0) rotateY(0)`;
});

/* VOLVER */
function goBack() {
  window.history.back();
}

</script>

</body>
</html>
