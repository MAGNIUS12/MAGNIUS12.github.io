<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGNIUS</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
  color: white;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* 🔥 INTRO LOCA */
#intro {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  overflow: hidden;
}

#intro h1 {
  font-size: 120px;
  font-family: 'Oswald';
  background: linear-gradient(45deg, #fff, #00ff88);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: introZoom 2s ease forwards;
}

@keyframes introZoom {
  0% { transform: scale(0.5) rotate(-20deg); opacity:0; }
  50% { transform: scale(1.2) rotate(10deg); }
  100% { transform: scale(1) rotate(0); opacity:1; }
}

.fadeOut {
  opacity: 0;
  transition: 1s;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  padding: 20px 50px;
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav h1 {
  font-family: 'Oswald';
}

/* HERO ROTANDO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0% { transform: rotate(0deg) translateY(0); }
  50% { transform: rotate(1deg) translateY(-10px); }
  100% { transform: rotate(0deg) translateY(0); }
}

.hero h2 {
  font-size: 80px;
  font-family: 'Oswald';
  animation: spinText 6s linear infinite;
}

@keyframes spinText {
  0% { transform: rotateY(0); }
  100% { transform: rotateY(360deg); }
}

.hero button {
  margin-top: 20px;
  padding: 15px 40px;
  border-radius: 30px;
  border: none;
  background: #00ff88;
  cursor: pointer;
}

/* SECTION */
.section {
  padding: 120px 40px;
}

/* GRID */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 30px;
}

/* 💥 CARD ANIMADA */
.card {
  background: #111;
  padding: 15px;
  border-radius: 15px;
  transform: rotateX(90deg) scale(0.8);
  opacity: 0;
  transition: 0.8s;
}

.card.show {
  transform: rotateX(0deg) scale(1);
  opacity: 1;
}

/* 🌀 HOVER 3D */
.card:hover {
  transform: rotateY(10deg) rotateX(10deg) scale(1.05);
  box-shadow: 0 20px 50px rgba(0,255,136,0.4);
}

/* IMAGEN */
.card img {
  width: 100%;
  height: 250px;
  object-fit: contain;
  background: white;
  border-radius: 10px;
  transition: 0.5s;
}

.card:hover img {
  transform: rotate(5deg) scale(1.1);
}

/* TEXTO */
.card h4 {
  margin-top: 10px;
  font-family: 'Oswald';
}

.card p {
  color: #00ff88;
}

/* BOTÓN */
.buy {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #00ff88;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.buy:hover {
  transform: scale(1.1) rotate(-2deg);
}

/* ✨ EFECTO CLICK */
.buy:active {
  transform: scale(0.9);
}

</style>
</head>

<body>

<div id="intro">
  <h1>MAGNIUS</h1>
</div>

<nav>
  <h1>MAGNIUS</h1>
</nav>

<div class="hero">
  <h2>MAGNIUS</h2>
  <button onclick="scrollToShop()">SHOP</button>
</div>

<div class="section" id="shop">
  <div class="products">

    <!-- TUS IMÁGENES -->
    <div class="card"><img src="back-in-black.png"><h4>BACK IN BLACK</h4><p>30€</p><button class="buy">Comprar</button></div>
    <div class="card"><img src="broken-black.png"><h4>BROKEN BLACK</h4><p>32€</p><button class="buy">Comprar</button></div>
    <div class="card"><img src="dark-fade.png"><h4>DARK FADE</h4><p>28€</p><button class="buy">Comprar</button></div>

    <!-- (puedes dejar todas las demás igual) -->

  </div>
</div>

<script>

/* INTRO */
setTimeout(() => {
  document.getElementById("intro").classList.add("fadeOut");
}, 2000);

/* SCROLL */
function scrollToShop() {
  document.getElementById('shop').scrollIntoView({ behavior: "smooth" });
}

/* ENTRADA CARDS */
const cards = document.querySelectorAll(".card");

window.addEventListener("scroll", () => {
  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    if (rect.top < window.innerHeight - 50) {
      card.classList.add("show");
    }
  });
});

</script>

</body>
</html>
