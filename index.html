<!DOCTYPE html>
<html>
<head>
  <title>Magnius</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    header {
      background: black;
      padding: 20px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
      background: url('https://via.placeholder.com/800x300') center/cover;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .container {
      padding: 20px;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .card {
      background: #1a1a1a;
      border-radius: 15px;
      width: 220px;
      padding: 15px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: #00ff88;
      font-weight: bold;
      margin: 10px 0;
    }

    button {
      background: #00ff88;
      color: black;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00cc6a;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: black;
      margin-top: 30px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  MAGNIUS 👕
</header>

<div class="hero">
  <h1>Streetwear Collection</h1>
  <p>Tu estilo empieza aquí 🔥</p>
</div>

<div class="container">
  <h2 style="text-align:center;">Productos</h2>

  <div class="products">

    <div class="card">
     <img src="https://picsum.photos/200">
      <h3>Camiseta Oversize Blanca</h3>
      <p class="price">29€</p>
      <a href="https://wa.me/34600000000">
        <button>Comprar</button>
      </a>
    </div>

    <div class="card">
      <img src="https://picsum.photos/200">
      <h3>Camiseta Negra Premium</h3>
      <p class="price">35€</p>
      <a href="https://wa.me/34600000000">
        <button>Comprar</button>
      </a>
    </div>

    <div class="card">
      <img src="https://picsum.photos/200">
      <h3>Camiseta Roja Street</h3>
      <p class="price">32€</p>
      <a href="https://wa.me/34600000000">
        <button>Comprar</button>
      </a>
    </div>

  </div>
</div>

<footer>
  © 2026 MAGNIUS - Todos los derechos reservados
</footer>

</body>
</html>
