<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGNIUS</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  background: black;
}

nav h1 {
  font-family: 'Oswald';
  letter-spacing: 4px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero h2 {
  font-size: 60px;
  font-family: 'Oswald';
}

.hero button {
  padding: 10px 30px;
  margin-top: 20px;
  cursor: pointer;
}

/* PRODUCTS */
.section {
  padding: 80px 20px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.buy {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<nav>
  <h1>MAGNIUS</h1>
</nav>

<div class="hero">
  <h2>MAGNIUS</h2>
  <p>NOT FOR EVERYONE</p>
  <button onclick="document.getElementById('shop').scrollIntoView()">SHOP</button>
</div>

<div class="section" id="shop">
  <h2>PRODUCTOS</h2>

  <div class="products">

    <div class="card">
      <img src="back-in-black.png">
      <p>BACK IN BLACK - 30€</p>
      <button class="buy">Comprar</button>
    </div>

    <div class="card">
      <img src="broken-black.png">
      <p>BROKEN BLACK - 32€</p>
      <button class="buy">Comprar</button>
    </div>

    <div class="card">
      <img src="dark-fade.png">
      <p>DARK FADE - 28€</p>
      <button class="buy">Comprar</button>
    </div>

    <div class="card">
      <img src="simple-beige.png">
      <p>SIMPLE BEIGE - 33€</p>
      <button class="buy">Comprar</button>
    </div>

    <div class="card">
      <img src="simple-red.png">
      <p>SIMPLE RED - 34€</p>
      <button class="buy">Comprar</button>
    </div>

    <div class="card">
      <img src="negra.png">
      <p>BLACK PREMIUM - 35€</p>
      <button class="buy">Comprar</button>
    </div>

  </div>
</div>

</body>
</html>
