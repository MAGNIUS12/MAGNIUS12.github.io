<!DOCTYPE html>
<html>
<head>
  <title>Magnius</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background-color: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 30px;
    }

    .container {
      padding: 20px;
    }

    .products {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 15px;
      width: 200px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>

<body>

<header>
  MAGNIUS 👕
</header>

<div class="container">
  <h2 style="text-align:center;">Nuestra colección</h2>

  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Camiseta básica</h3>
      <p class="price">15€</p>
      <button>Comprar</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Camiseta negra</h3>
      <p class="price">20€</p>
      <button>Comprar</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Camiseta premium</h3>
      <p class="price">25€</p>
      <button>Comprar</button>
    </div>

  </div>
</div>

</body>
</html>
